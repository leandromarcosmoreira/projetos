<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BeaBisa IA — Analytics</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary: #0EA5E9;
      --primary-dark: #0284C7;
      --accent: #06B6D4;
      --success: #10B981;
      --bg: #060B18;
      --card: #0C1526;
      --border: rgba(255,255,255,0.08);
      --text: #F1F5F9;
      --muted: #64748B;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* ── Animated Mesh Background ── */
    .bg-mesh {
      position: fixed; inset: 0; z-index: 0;
      background:
        radial-gradient(ellipse 80% 80% at 20% 20%, rgba(14,165,233,0.12) 0%, transparent 50%),
        radial-gradient(ellipse 60% 60% at 80% 80%, rgba(6,182,212,0.10) 0%, transparent 50%),
        radial-gradient(ellipse 50% 50% at 50% 10%, rgba(16,185,129,0.07) 0%, transparent 50%),
        #060B18;
      animation: meshShift 12s ease-in-out infinite alternate;
    }
    @keyframes meshShift {
      from { filter: hue-rotate(0deg); }
      to   { filter: hue-rotate(30deg); }
    }

    /* ── Grid dots overlay ── */
    .bg-grid {
      position: fixed; inset: 0; z-index: 0;
      background-image: radial-gradient(circle, rgba(255,255,255,0.04) 1px, transparent 1px);
      background-size: 40px 40px;
    }

    /* ── Floating orbs ── */
    .orb {
      position: fixed; border-radius: 50%; filter: blur(80px); opacity: 0.15; z-index: 0;
      animation: float 8s ease-in-out infinite alternate;
    }
    .orb-1 { width: 500px; height: 500px; background: var(--primary); top: -150px; left: -100px; animation-delay: 0s; }
    .orb-2 { width: 400px; height: 400px; background: var(--accent); bottom: -100px; right: -80px; animation-delay: -4s; }
    .orb-3 { width: 300px; height: 300px; background: var(--success); top: 50%; left: 60%; animation-delay: -2s; }
    @keyframes float {
      from { transform: translate(0, 0) scale(1); }
      to   { transform: translate(30px, -20px) scale(1.05); }
    }

    /* ── Login Card ── */
    .login-wrapper {
      position: relative; z-index: 10;
      display: flex; flex-direction: column; align-items: center; gap: 32px;
      animation: fadeUp 0.7s ease both;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .brand {
      text-align: center;
    }
    .brand-logo {
      display: inline-flex; align-items: center; gap: 12px; margin-bottom: 8px;
    }
    .brand-icon {
      width: 52px; height: 52px;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 0 30px rgba(14,165,233,0.4);
    }
    .brand-icon svg { width: 28px; height: 28px; fill: white; }
    .brand-name {
      font-size: 28px; font-weight: 800; letter-spacing: -0.5px;
      background: linear-gradient(135deg, #fff 30%, var(--accent));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .brand-sub {
      font-size: 13px; color: var(--muted); letter-spacing: 3px; text-transform: uppercase; font-weight: 500;
    }

    .card {
      width: 420px;
      background: rgba(12, 21, 38, 0.8);
      backdrop-filter: blur(20px);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 40px;
      box-shadow: 0 24px 64px rgba(0,0,0,0.5), 0 0 0 1px rgba(14,165,233,0.05);
    }

    .card-header { margin-bottom: 28px; text-align: center; }
    .card-title { font-size: 20px; font-weight: 700; color: var(--text); margin-bottom: 4px; }
    .card-subtitle { font-size: 13px; color: var(--muted); }

    .badge-sankhya {
      display: inline-flex; align-items: center; gap: 6px;
      background: rgba(14,165,233,0.1); border: 1px solid rgba(14,165,233,0.2);
      border-radius: 20px; padding: 4px 12px; font-size: 12px; color: var(--primary);
      font-weight: 500; margin-top: 8px;
    }
    .badge-dot { width: 6px; height: 6px; background: var(--primary); border-radius: 50%; animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }

    .form-group { margin-bottom: 18px; }
    .form-label { display: block; font-size: 12px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }

    .input-wrap { position: relative; }
    .input-icon { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); opacity: 0.4; pointer-events: none; }
    .input-icon svg { width: 16px; height: 16px; stroke: var(--text); fill: none; stroke-width: 2; }

    input[type="text"], input[type="password"] {
      width: 100%;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 14px 12px 40px;
      font-family: 'Inter', sans-serif;
      font-size: 14px; color: var(--text);
      outline: none; transition: border-color 0.2s, box-shadow 0.2s;
    }
    input::placeholder { color: var(--muted); }
    input:focus { border-color: rgba(14,165,233,0.5); box-shadow: 0 0 0 3px rgba(14,165,233,0.08); }

    .btn-login {
      width: 100%; padding: 14px;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      border: none; border-radius: 10px;
      font-family: 'Inter', sans-serif; font-size: 15px; font-weight: 600; color: white;
      cursor: pointer; letter-spacing: 0.3px;
      transition: transform 0.15s, box-shadow 0.15s, opacity 0.15s;
      box-shadow: 0 4px 20px rgba(14,165,233,0.35);
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .btn-login:hover { transform: translateY(-1px); box-shadow: 0 8px 28px rgba(14,165,233,0.45); }
    .btn-login:active { transform: translateY(0); }

    .divider { height: 1px; background: var(--border); margin: 24px 0; }
    .help-text { text-align: center; font-size: 12px; color: var(--muted); line-height: 1.6; }
    .help-text a { color: var(--primary); text-decoration: none; }

    .powered-by { font-size: 12px; color: var(--muted); text-align: center; }
    .powered-by span { color: rgba(255,255,255,0.3); }
  </style>
</head>
<body>
  <div class="bg-mesh"></div>
  <div class="bg-grid"></div>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>

  <div class="login-wrapper">
    <div class="brand">
      <div class="brand-logo">
        <div class="brand-icon">
          <svg viewBox="0 0 24 24"><path d="M3 3h7v7H3V3zm0 11h7v7H3v-7zm11-11h7v7h-7V3zm4 11v2h-4v-2h4zm0 4v2h-4v-2h4zm-4-2h2v2h-2v-2z"/></svg>
        </div>
        <span class="brand-name">BeaBisa IA</span>
      </div>
      <div class="brand-sub">Analytics Platform</div>
    </div>

    <div class="card">
      <div class="card-header">
        <div class="card-title">Bem-vindo de volta</div>
        <div class="card-subtitle">Entre com suas credenciais do ERP</div>
        <div class="badge-sankhya">
          <div class="badge-dot"></div>
          Autenticação via Sankhya
        </div>
      </div>

      <form onsubmit="doLogin(event)">
        <div class="form-group">
          <label class="form-label">Usuário Sankhya</label>
          <div class="input-wrap">
            <span class="input-icon">
              <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            </span>
            <input type="text" placeholder="seu.usuario" id="user" value="leandro.moreira">
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">Senha</label>
          <div class="input-wrap">
            <span class="input-icon">
              <svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            </span>
            <input type="password" placeholder="••••••••" id="pass" value="demo1234">
          </div>
        </div>

        <button type="submit" class="btn-login" id="loginBtn">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
          Entrar na Plataforma
        </button>
      </form>

      <div class="divider"></div>
      <div class="help-text">
        Problemas de acesso? Contate o administrador do sistema<br>
        ou <a href="#">redefinir senha via Sankhya</a>
      </div>
    </div>

    <div class="powered-by">
      <span>©</span> 2026 BeaBisa &nbsp;·&nbsp; Powered by <strong style="color:rgba(255,255,255,0.5)">Neuon Soluções</strong>
    </div>
  </div>

  <script>
    function doLogin(e) {
      e.preventDefault();
      const btn = document.getElementById('loginBtn');
      btn.innerHTML = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="animation:spin 0.8s linear infinite"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg> Autenticando...`;
      btn.style.opacity = '0.8';
      setTimeout(() => { window.location.href = '02-dashboard.html'; }, 1200);
    }
    const style = document.createElement('style');
    style.textContent = `@keyframes spin { to { transform: rotate(360deg); } }`;
    document.head.appendChild(style);
  </script>
</body>
</html>
